#
# MiniServer Squid-Cache Configuration
# Optimized for TV Box with SDCard storage
#

# ==================== NETWORK ====================
http_port 3128
http_port 3129 intercept
https_port 3130 cert=/etc/squid/ssl_cert/myCA.pem generate-host-certificates=on dynamic_cert_mem_cache_size=4MB

# Listen on all interfaces
http_access allow all

# ==================== ACL ====================
acl localnet src 0.0.0.0/0
acl localhost src 127.0.0.1/32
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 443
acl Safe_ports port 70
acl Safe_ports port 210
acl Safe_ports port 1025-65535
acl Safe_ports port 280
acl Safe_ports port 488
acl Safe_ports port 591
acl Safe_ports port 777
acl CONNECT method CONNECT

# ==================== ACCESS CONTROLS ====================
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost manager
http_access deny manager
http_access allow localnet
http_access allow localhost
http_access deny all

# ==================== CACHE CONFIGURATION ====================
# Memory cache (256 MB - suitable for 1-2GB RAM devices)
cache_mem 256 MB

# Maximum object size in memory
maximum_object_size_in_memory 512 KB

# Disk cache (5 GB on SDCard)
cache_dir ufs /var/spool/squid 5000 16 256

# Cache replacement policy
cache_replacement_policy heap LFUDA
memory_replacement_policy heap GDSF

# ==================== OBJECT SIZE LIMITS ====================
maximum_object_size 50 MB
minimum_object_size 0 KB

# ==================== REFRESH PATTERNS ====================
refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern -i (/cgi-bin/|\?) 0     0%      0
refresh_pattern -i \.(jpg|jpeg|png|gif|bmp|webp|ico)$ 0    50%     4320
refresh_pattern -i \.(css|js|json|xml)$ 0   20%     1440
refresh_pattern -i \.(html|htm|php|shtml)$ 0    10%     720
refresh_pattern -i \.(mp4|avi|mkv|webm|flv)$ 0   5%      1440
refresh_pattern -i \.(mp3|wav|flac|ogg|aac)$ 0   10%     1440
refresh_pattern -i \.(zip|tar|gz|bz2|rar|7z)$ 0   20%     4320
refresh_pattern -i \.(pdf|doc|docx|xls|xlsx|ppt|pptx)$ 0   20%     4320
refresh_pattern -i \.(apk|ipa|exe|msi|deb|rpm)$ 0    10%     1440
refresh_pattern -i amazonaws\.com 0    50%     1440
refresh_pattern -i cloudfront\.net 0   50%     1440
refresh_pattern .               0       20%     4320

# ==================== PERFORMANCE TUNING ====================
# Connection settings
quick_abort_min 16 KB
quick_abort_max 16 KB
quick_abort_pct 25

# Read ahead
read_ahead_gap 64 KB

# Client idle timeout
client_idle_pconn_timeout 120 seconds

# Server idle timeout
server_idle_pconn_timeout 120 seconds

# DNS
dns_nameservers 1.1.1.1 8.8.8.8
dns_v4_first on

# Negative caching
negative_ttl 1 minutes
positive_dns_ttl 6 hours
negative_dns_ttl 1 minutes

# ==================== LOGGING ====================
# Access log
access_log daemon:/var/log/squid/access.log squid

# Cache log
cache_log /var/log/squid/cache.log

# Store log
cache_store_log none

# Log format
logformat squid %ts.%03tu %6tr %>a %Ss/%03Hs %<st %rm %ru %un %Sh/%<A %mt

# Rotate logs
logfile_rotate 7

# ==================== VISIBLE NAME ====================
visible_hostname MiniServer-Proxy

# ==================== CACHE PEER (OPTIONAL) ====================
# Uncomment to use parent proxy
# cache_peer parent.proxy.local parent 3128 0 no-query default

# ==================== DNS ====================
dns_v4_first on
ipcache_size 1024
ipcache_low 90
ipcache_high 95
fqdncache_size 1024

# ==================== TIMEOUTS ====================
forward_timeout 30 seconds
connect_timeout 60 seconds
read_timeout 15 minutes
request_timeout 5 minutes
persistent_request_timeout 2 minutes
shutdown_lifetime 30 seconds

# ==================== DELAY POOLS (Bandwidth Management) ====================
# Uncomment to enable bandwidth limiting
# delay_pools 1
# delay_class 1 1
# delay_parameters 1 1000000/5000000
# delay_initial_bucket_level 50
# acl limited_bw src 192.168.1.0/24
# delay_access 1 allow limited_bw

# ==================== SNMP ====================
# snmp_port 3401
# snmp_access allow localhost
# snmp_access deny all

# ==================== SSL Bump (HTTPS inspection) ====================
# Uncomment to enable HTTPS inspection
# http_port 3128 ssl-bump cert=/etc/squid/ssl_cert/myCA.pem generate-host-certificates=on dynamic_cert_mem_cache_size=4MB
# ssl_bump peek all
# ssl_bump bump all
# sslproxy_cert_error allow all
# sslproxy_flags DONT_VERIFY_PEER

# ==================== AD BLOCKING (via Squid) ====================
# Uncomment to use Squid-based ad blocking
# acl ads dstdom_regex -i "/etc/squid/adblocks.txt"
# http_reply_access deny ads

# ==================== PARENT PROXY ====================
# never_direct allow localhost
# never_direct deny all

# ==================== ADMIN ====================
cache_mgr admin@localhost

# ==================== CACHE DIGEST ====================
# cache_digest on
# cache_digest_bits 4096
