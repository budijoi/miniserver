# MiniServer Adblock Configuration
# DNS-based ad blocking using dnsmasq

# Konfigurasi dnsmasq untuk adblock
# Letakkan di /etc/dnsmasq.d/adblock.conf

# Adblock hosts file
addn-hosts=/etc/dnsmasq.d/adblock.hosts

# Cache size
cache-size=10000

# Negate DNS queries for known ad domains
neg-ttl=3600

# Listen only on local interfaces
local-service

# DNS server
server=1.1.1.1
server=8.8.8.8

# Bind to interfaces
bind-interfaces
interface=lo
interface=eth0
interface=wlan0

# Domain yang tidak diblokir (whitelist)
# whitelist domain jika ada false positive
# server=/example.com/1.1.1.1
