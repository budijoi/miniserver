# /etc/fstab: static file system information for SDCard
# Copy this content to /etc/fstab after mounting SDCard
#
# Format: <device> <mountpoint> <type> <options> <dump> <pass>
#
# Uncomment and modify UUID below:
# UUID=your-sdcard-uuid /mnt/sdcard ext4 defaults,noatime,nodiratime,errors=remount-ro 0 2
#
# Or use device path:
# /dev/mmcblk1p1 /mnt/sdcard ext4 defaults,noatime,nodiratime,errors=remount-ro 0 2
